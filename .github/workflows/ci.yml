name: PR Quality Gate

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test || echo "tests missing or failing"

      - name: Build
        run: npm run build

      - name: Audit dependencies
        run: npm audit --audit-level=critical || echo "audit found issues (non-blocking)"
